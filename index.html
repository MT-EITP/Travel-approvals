// ─── Helpers ──────────────────────────────────────────────────────────────────
function needsVP(travelDate, tripType, cost) {
  var today = new Date(); today.setHours(0,0,0,0);
  var days = travelDate ? Math.ceil((new Date(travelDate) - today) / 86400000) : 999;
  var shortNotice = (tripType === "domestic" && days < 14) || (tripType === "international" && days < 21);
  var highCost = Number(cost) > 2500;
  return shortNotice || highCost;
}

function daysUntil(travelDate) {
  if (!travelDate) return null;
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((new Date(travelDate) - today) / 86400000);
}

function getApproval(approvals, role) {
  return approvals && approvals[role] ? approvals[role] : null;
}

function nameToEmail(name) {
  var parts = name.trim().toLowerCase().split(" ");
  return parts[0] + "." + parts[parts.length - 1] + "@mckesson.com";
}

function getNextApprover(req) {
  var chain = req.orgChain || [];
  if (needsVP(req.travelDate, req.tripType, req.estimatedCost)) {
    var hasVP = chain.find(function(m) { return m.role === "Vice President"; });
    if (!hasVP) {
      var vp = STAFF.find(function(s) { return s.role === "Vice President"; });
      if (vp) chain = chain.concat([{ id: vp.id, name: vp.name, role: vp.role }]);
    }
  }
  for (var i = 0; i < chain.length; i++) {
    var approval = getApproval(req.approvals, chain[i].role);
    if (!approval) return chain[i];
  }
  return null;
}

function buildMailtoLink(toName, subject, body) {
  var email = nameToEmail(toName);
  return "mailto:" + email + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
}

function buildApprovalNotifyLink(req, submitterName) {
  var next = getNextApprover(req);
  if (!next) return null;
  var subject = "Action Required: Travel Request from " + submitterName;
  var body =
    "Hi " + next.name + ",\n\n" +
    "A travel request requires your approval.\n\n" +
    "Submitted by: " + submitterName + "\n" +
    "Destination: " + req.destination + "\n" +
    "Travel Date: " + req.travelDate + "\n" +
    "Duration: " + req.duration + " days\n" +
    "Estimated Cost: $" + Number(req.estimatedCost).toLocaleString() + "\n" +
    "Purpose: " + req.purpose + "\n" +
    (req.notes ? "Business Justification: " + req.notes + "\n" : "") +
    "\nPlease log in to the Travel Approvals app to approve or reject:\n" +
    window.location.href;
  return buildMailtoLink(next.name, subject, body);
}

function buildDecisionNotifyLink(req, action, approverName) {
  var submitter = STAFF.find(function(s) { return s.id === req.submitterId; });
  if (!submitter) return null;
  var actionWord = action === "approve" ? "Approved" : "Rejected";
  var subject = "Travel Request " + actionWord + ": " + req.destination;
  var body =
    "Hi " + submitter.name + ",\n\n" +
    "Your travel request has been " + actionWord.toLowerCase() + " by " + approverName + ".\n\n" +
    "Destination: " + req.destination + "\n" +
    "Travel Date: " + req.travelDate + "\n" +
    "Estimated Cost: $" + Number(req.estimatedCost).toLocaleString() + "\n\n" +
    "Log in to the Travel Approvals app for full details:\n" +
    window.location.href;
  return buildMailtoLink(submitter.name, subject, body);
}

function canAct(req, user) {
  if (!user || user.id === req.submitterId) return false;
  var chain = (req.orgChain || []).map(function(m) { return m.role; });
  if (needsVP(req.travelDate, req.tripType, req.estimatedCost) && chain.indexOf("Vice President") === -1) {
    chain.push("Vice President");
  }
  var idx = chain.indexOf(user.role);
  if (idx === -1) return false;
  var prevRole = idx > 0 ? chain[idx - 1] : null;
  var prevApproval = prevRole ? getApproval(req.approvals, prevRole) : null;
  var prevOk = !prevRole || (prevApproval && prevApproval.status === "Approved");
  var myApproval = getApproval(req.approvals, user.role);
  return prevOk && !myApproval && req.status !== "Rejected" && req.status !== "Fully Approved";
}

function applyAction(req, user, action, comment) {
  var newApprovals = {};
  Object.keys(req.approvals).forEach(function(k) { newApprovals[k] = req.approvals[k]; });
  newApprovals[user.role] = {
    status: action === "approve" ? "Approved" : "Rejected",
    approverName: user.name, comment: comment, at: new Date().toISOString()
  };
  var vp = needsVP(req.travelDate, req.tripType, req.estimatedCost);
  var chain = (req.orgChain || []).map(function(m) { return m.role; });
  if (vp && chain.indexOf("Vice President") === -1) chain.push("Vice President");
  var status = "Pending";
  if (action === "reject") {
    status = "Rejected";
  } else if (chain.every(function(r) { var a = getApproval(newApprovals, r); return a && a.status === "Approved"; })) {
    status = "Fully Approved";
  } else {
    var sdApproval = getApproval(newApprovals, "Senior Director");
    var vpApproval = getApproval(newApprovals, "Vice President");
    if (vp && sdApproval && sdApproval.status === "Approved" && !vpApproval) status = "VP Review";
  }
  return Object.assign({}, req, { approvals: newApprovals, status: status });
}

// ─── Badge ────────────────────────────────────────────────────────────────────
function Badge(props) {
  var status = props.status;
  var styles = {
    "Pending": "bg-amber-50 text-amber-700 border-amber-200",
    "Rejected": "bg-red-50 text-red-700 border-red-200",
    "VP Review": "bg-purple-50 text-purple-700 border-purple-200",
    "Fully Approved": "bg-emerald-50 text-emerald-700 border-emerald-200",
  };
  var dots = {
    "Pending": "bg-amber-400", "Rejected": "bg-red-500",
    "VP Review": "bg-purple-500", "Fully Approved": "bg-emerald-500",
  };
  return (
    <span className={"inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold border " + (styles[status] || styles["Pending"])}>
      <span className={"w-1.5 h-1.5 rounded-full " + (dots[status] || "bg-amber-400")}></span>
      {status}
    </span>
  );
}

// ─── Timeline ─────────────────────────────────────────────────────────────────
function Timeline(props) {
  var orgChain = props.orgChain || [];
  var approvals = props.approvals || {};
  var vpNeeded = props.vpNeeded;
  var display = orgChain.slice();
  if (vpNeeded && !display.find(function(m) { return m.role === "Vice President"; })) {
    var vp = STAFF.find(function(s) { return s.role === "Vice President"; });
    display.push({ name: vp ? vp.name : "Vice President", role: "Vice President" });
  }
  if (!display.length) return null;
  return (
    <div className="mt-4">
      <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Approval Chain</p>
      <div className="flex items-start flex-wrap gap-1">
        {display.map(function(person, i) {
          var appr = getApproval(approvals, person.role);
          var state = appr && appr.status === "Approved" ? "approved" : appr && appr.status === "Rejected" ? "rejected" : "pending";
          var prevAppr = i > 0 ? getApproval(approvals, display[i-1].role) : null;
          var prevOk = i === 0 || (prevAppr && prevAppr.status === "Approved");
          var active = prevOk && !appr;
          var roleShort = person.role === "Vice President" ? "VP" : person.role === "Senior Director" ? "Sr.Dir" : person.role === "Senior Manager" ? "Sr.Mgr" : person.role;
          var circleClass = "w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border-2 " + (
            state === "approved" ? "bg-emerald-500 border-emerald-500 text-white" :
            state === "rejected" ? "bg-red-500 border-red-500 text-white" :
            active ? "bg-white border-blue-500 text-blue-600" : "bg-white border-slate-200 text-slate-400"
          );
          return (
            <div key={i} className="flex items-center">
              <div className="flex flex-col items-center w-16">
                <div className={circleClass}>{state === "approved" ? "✓" : state === "rejected" ? "✕" : i+1}</div>
                <span className={"text-xs mt-1 text-center leading-tight font-medium truncate w-full " + (state === "approved" ? "text-emerald-600" : state === "rejected" ? "text-red-600" : active ? "text-blue-600" : "text-slate-400")}>
                  {person.name ? person.name.split(" ")[0] : ""}
                </span>
                <span className="text-center text-slate-400" style={{fontSize:"0.6rem"}}>{roleShort}</span>
              </div>
              {i < display.length-1 && <div className={"h-0.5 w-4 -mt-8 " + (state === "approved" ? "bg-emerald-400" : "bg-slate-200")}></div>}
            </div>
          );
        })}
      </div>
      {vpNeeded && <p className="mt-2 text-xs text-purple-600 font-medium">⚡ VP approval required — short-notice or high-cost travel</p>}
    </div>
  );
}

// ─── Request Card ─────────────────────────────────────────────────────────────
function RequestCard(props) {
  var req = props.req;
  var user = props.user;
  var [comment, setComment] = useState("");
  var [emailModal, setEmailModal] = useState(null);
  var vp = needsVP(req.travelDate, req.tripType, req.estimatedCost);
  var days = daysUntil(req.travelDate);
  var can = canAct(req, user);
  var dateStr = req.travelDate ? new Date(req.travelDate).toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"}) : "";
  var tripLabel = req.tripType ? req.tripType.charAt(0).toUpperCase() + req.tripType.slice(1) : "";

  function handleAction(action) {
    var updatedReq = applyAction(req, user, action, comment);
    props.onAction(req.id, updatedReq);
    setComment("");

    // Build email links
    var emailLinks = [];
    var decisionLink = buildDecisionNotifyLink(updatedReq, action, user.name);
    if (decisionLink) {
      emailLinks.push({
        href: decisionLink,
        label: "Email " + req.submitterName,
        desc: "Notify them their request was " + (action === "approve" ? "approved" : "rejected"),
      });
    }
    if (action === "approve" && updatedReq.status !== "Fully Approved") {
      var nextLink = buildApprovalNotifyLink(updatedReq, req.submitterName);
      var next = getNextApprover(updatedReq);
      if (nextLink && next) {
        emailLinks.push({
          href: nextLink,
          label: "Email " + next.name,
          desc: "Notify them approval is needed",
        });
      }
    }
    if (emailLinks.length > 0) {
      setEmailModal({
        title: action === "approve" ? "Request Approved ✓" : "Request Rejected",
        subtitle: "Open these pre-filled emails in Outlook to notify the relevant people.",
        links: emailLinks,
      });
    }
  }

  return (
    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
      {emailModal && (
        <EmailModal
          title={emailModal.title}
          subtitle={emailModal.subtitle}
          links={emailModal.links}
          onClose={function() { setEmailModal(null); }}
        />
      )}

      <div className="flex items-start justify-between gap-3 mb-3">
        <div>
          <div className="flex items-center gap-2 mb-1">
            <span className="font-bold text-slate-800 text-sm">{req.submitterName}</span>
            {req.department && <span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{req.department}</span>}
          </div>
          <p className="text-base font-semibold text-slate-900">{req.destination}</p>
          <p className="text-xs text-slate-500 mt-0.5">
            {req.tripType === "international" ? "🌍" : "🏢"} {tripLabel} · {dateStr}
            {days !== null && <span className={"ml-1 font-semibold " + (days < 7 ? "text-red-500" : days < 14 ? "text-amber-500" : "text-slate-400")}> ({days}d away)</span>}
          </p>
        </div>
        <Badge status={req.status} />
      </div>

      <div className="grid grid-cols-3 gap-2 my-3">
        {[{l:"Est. Cost",v:"$"+Number(req.estimatedCost).toLocaleString()},{l:"Duration",v:req.duration+"d"},{l:"Purpose",v:req.purpose}].map(function(item) {
          return (
            <div key={item.l} className="bg-slate-50 rounded-lg p-2 text-center">
              <p className="text-xs text-slate-400 font-medium">{item.l}</p>
              <p className="text-sm font-bold text-slate-800 truncate">{item.v}</p>
            </div>
          );
        })}
      </div>

      {req.notes && (
        <div className="mb-3 bg-slate-50 rounded-lg px-3 py-2">
          <p className="text-xs font-semibold text-slate-500 mb-0.5">Business Justification</p>
          <p className="text-xs text-slate-600">"{req.notes}"</p>
        </div>
      )}

      <Timeline orgChain={req.orgChain} approvals={req.approvals} vpNeeded={vp} />

      {Object.keys(req.approvals).length > 0 && (
        <div className="mt-3 space-y-1">
          {Object.keys(req.approvals).map(function(role) {
            var data = req.approvals[role];
            return (
              <div key={role} className={"flex items-center gap-2 text-xs px-3 py-1.5 rounded-lg " + (data.status === "Approved" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700")}>
                <span>{data.status === "Approved" ? "✓" : "✕"}</span>
                <span className="font-semibold">{data.approverName}</span>
                <span className="opacity-50">({role})</span>
                {data.comment && <span className="text-slate-500">— {data.comment}</span>}
              </div>
            );
          })}
        </div>
      )}

      {can && (
        <div className="mt-4 border-t border-slate-100 pt-4">
          <input className="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 mb-2 focus:outline-none focus:ring-2 focus:ring-blue-300"
            placeholder="Add a comment (optional)..." value={comment}
            onChange={function(e){setComment(e.target.value);}} />
          <div className="flex gap-2">
            <button onClick={function(){handleAction("approve");}}
              className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold py-2 rounded-lg">✓ Approve</button>
            <button onClick={function(){handleAction("reject");}}
              className="flex-1 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 text-sm font-semibold py-2 rounded-lg">✕ Reject</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── New Request Modal ────────────────────────────────────────────────────────
function NewRequestModal(props) {
  var user = props.user;
  var [form, setForm] = useState({ destination:"", tripType:"domestic", travelDate:"", duration:"", estimatedCost:"", purpose:"Conference", notes:"" });
  var [emailModal, setEmailModal] = useState(null);
  var vp = (form.travelDate || form.estimatedCost) && needsVP(form.travelDate, form.tripType, form.estimatedCost);
  var days = daysUntil(form.travelDate);
  var valid = form.destination && form.travelDate && form.duration && form.estimatedCost;
  var inp = "w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300";

  var vpMsg = "";
  if (vp) {
    var overCost = Number(form.estimatedCost) > 2500;
    var shortN = days !== null && ((form.tripType === "domestic" && days < 14) || (form.tripType === "international" && days < 21));
    if (overCost && shortN) vpMsg = "This trip exceeds $2,500 and is short-notice — VP approval required for both reasons.";
    else if (overCost) vpMsg = "Estimated cost exceeds $2,500 — VP approval is required.";
    else vpMsg = "This " + form.tripType + " trip is " + days + " days away — below the " + (form.tripType === "domestic" ? "14-day domestic" : "21-day international") + " threshold. VP approval required.";
  }

  function handleSubmit() {
    if (!valid) return;
    var newReq = props.onSubmit(form);
    // Build email link to first approver
    var nextLink = buildApprovalNotifyLink(newReq, user.name);
    var next = getNextApprover(newReq);
    if (nextLink && next) {
      setEmailModal({
        title: "Request Submitted ✈",
        subtitle: "Open this pre-filled email in Outlook to notify your first approver.",
        links: [{ href: nextLink, label: "Email " + next.name, desc: "Let them know your request is waiting for approval" }],
      });
    } else {
      props.onClose();
    }
  }

  if (emailModal) {
    return (
      <EmailModal
        title={emailModal.title}
        subtitle={emailModal.subtitle}
        links={emailModal.links}
        onClose={props.onClose}
      />
    );
  }

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-screen overflow-y-auto">
        <div className="p-6 border-b border-slate-100 flex items-start justify-between">
          <div>
            <h2 className="text-xl font-bold text-slate-900">New Travel Request</h2>
            <p className="text-sm text-slate-500 mt-0.5">Submitting as <strong>{user.name}</strong> · {user.title}</p>
          </div>
          <button onClick={props.onClose} className="text-slate-400 hover:text-slate-600 text-xl font-bold mt-1">✕</button>
        </div>
        <div className="p-6 space-y-4">
          <div>
            <label className="block text-xs font-semibold text-slate-600 mb-1">Destination *</label>
            <input className={inp} placeholder="City, Country" value={form.destination} onChange={function(e){setForm(function(f){return Object.assign({},f,{destination:e.target.value});});}} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-semibold text-slate-600 mb-1">Trip Type</label>
              <select className={inp} value={form.tripType} onChange={function(e){setForm(function(f){return Object.assign({},f,{tripType:e.target.value});});}}>
                <option value="domestic">🏢 Domestic</option>
                <option value="international">🌍 International</option>
              </select>
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-600 mb-1">Purpose</label>
              <select className={inp} value={form.purpose} onChange={function(e){setForm(function(f){return Object.assign({},f,{purpose:e.target.value});});}}>
                {["Conference","Client Meeting","Training","Site Visit","Sales","Other"].map(function(p){return <option key={p}>{p}</option>;})}
              </select>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-semibold text-slate-600 mb-1">Travel Date *</label>
              <input type="date" className={inp} value={form.travelDate} onChange={function(e){setForm(function(f){return Object.assign({},f,{travelDate:e.target.value});});}} />
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-600 mb-1">Duration (days) *</label>
              <input type="number" min="1" className={inp} placeholder="e.g. 5" value={form.duration} onChange={function(e){setForm(function(f){return Object.assign({},f,{duration:e.target.value});});}} />
            </div>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-600 mb-1">Estimated Cost (USD) *</label>
            <input type="number" min="0" className={inp} placeholder="e.g. 2500" value={form.estimatedCost} onChange={function(e){setForm(function(f){return Object.assign({},f,{estimatedCost:e.target.value});});}} />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-600 mb-1">Business Justification</label>
            <textarea className={inp+" resize-none"} rows="3" placeholder="Explain the business need for this trip..." value={form.notes} onChange={function(e){setForm(function(f){return Object.assign({},f,{notes:e.target.value});});}}></textarea>
          </div>
          {vp && (
            <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 flex gap-2 items-start">
              <span className="text-purple-500 text-lg">⚡</span>
              <div>
                <p className="text-xs font-bold text-purple-700">VP Approval Required</p>
                <p className="text-xs text-purple-600 mt-0.5">{vpMsg}</p>
              </div>
            </div>
          )}
        </div>
        <div className="p-6 border-t border-slate-100 flex gap-3">
          <button onClick={props.onClose} className="flex-1 border border-slate-200 text-slate-600 text-sm font-semibold py-2.5 rounded-xl hover:bg-slate-50">Cancel</button>
          <button onClick={handleSubmit} disabled={!valid}
            className="flex-1 bg-blue-700 hover:bg-blue-800 disabled:opacity-40 text-white text-sm font-semibold py-2.5 rounded-xl">
            Submit Request
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Login Screen ─────────────────────────────────────────────────────────────
function LoginScreen(props) {
  var [sel, setSel] = useState("");
  var sorted = STAFF.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
  var person = STAFF.find(function(s){return s.id === sel;});
  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-lg border border-slate-200 p-8 max-w-md w-full">
        <div className="text-center mb-8">
          <div className="w-14 h-14 bg-blue-700 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <span className="text-white text-3xl">✈</span>
          </div>
          <h1 className="text-2xl font-bold text-slate-900">Travel Approvals</h1>
          <p className="text-slate-500 text-sm mt-2">Select your name to continue</p>
        </div>
        <div className="space-y-4">
          <div>
            <label className="block text-xs font-semibold text-slate-600 mb-2">Who are you?</label>
            <select className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300 bg-slate-50"
              value={sel} onChange={function(e){setSel(e.target.value);}}>
              <option value="">— Select your name —</option>
              {sorted.map(function(s){return <option key={s.id} value={s.id}>{s.name} · {s.title}</option>;})}
            </select>
          </div>
          {person && (
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
              <p className="text-sm font-semibold text-blue-900">{person.name}</p>
              <p className="text-xs text-blue-600 mt-0.5">{person.title} · {person.department}</p>
              <p className="text-xs text-blue-600 mt-0.5">Role: <strong>{person.role}</strong></p>
            </div>
          )}
          <button onClick={function(){if(sel && person) props.onLogin(person);}} disabled={!sel}
            className="w-full bg-blue-700 hover:bg-blue-800 disabled:opacity-40 text-white font-semibold py-3 rounded-xl">
            Continue
          </button>
        </div>
        <p className="text-xs text-slate-400 text-center mt-6">Not listed? Ask your administrator to add you to the staff directory.</p>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  var [user, setUser] = useState(null);
  var [requests, setRequests] = useState([]);
  var [showModal, setShowModal] = useState(false);
  var [filter, setFilter] = useState("All");
  var [nextId, setNextId] = useState(1);

  if (!user) return <LoginScreen onLogin={setUser} />;

  var canSubmit = user.role !== "Vice President";

  function handleAction(id, updatedReq) {
    setRequests(function(prev) {
      return prev.map(function(r) { return r.id === id ? updatedReq : r; });
    });
  }

  function handleSubmit(form) {
    var submitterRoleIdx = ROLE_ORDER.indexOf(user.role);
    var orgChain = (user.managerChain || []).filter(function(m) {
      return ROLE_ORDER.indexOf(m.role) > submitterRoleIdx;
    });
    var newReq = {
      id: nextId, submitterId: user.id, submitterName: user.name, department: user.department,
      destination: form.destination, tripType: form.tripType, travelDate: form.travelDate,
      duration: parseInt(form.duration), estimatedCost: parseFloat(form.estimatedCost),
      purpose: form.purpose, notes: form.notes, status: "Pending", approvals: {}, orgChain: orgChain,
      submittedAt: new Date().toISOString(),
    };
    setRequests(function(prev) { return prev.concat([newReq]); });
    setNextId(function(n) { return n + 1; });
    return newReq;
  }

  var statuses = ["All","Pending","VP Review","Fully Approved","Rejected"];
  var filtered = filter === "All" ? requests : requests.filter(function(r){return r.status === filter;});
  var stats = {
    total: requests.length,
    pending: requests.filter(function(r){return r.status==="Pending"||r.status==="VP Review";}).length,
    approved: requests.filter(function(r){return r.status==="Fully Approved";}).length,
    rejected: requests.filter(function(r){return r.status==="Rejected";}).length,
  };

  return (
    <div className="min-h-screen bg-slate-50">
      <div className="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 bg-blue-700 rounded-xl flex items-center justify-center">
              <span className="text-white text-lg">✈</span>
            </div>
            <div>
              <h1 className="text-lg font-bold text-slate-900 leading-none">Travel Approvals</h1>
              <p className="text-xs text-slate-400 mt-0.5">Travel Request &amp; Approval System</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5">
              <div className="w-7 h-7 bg-blue-700 rounded-full flex items-center justify-center text-white text-xs font-bold">{user.name.charAt(0)}</div>
              <div className="hidden sm:block">
                <p className="text-xs font-semibold text-slate-800 leading-none">{user.name}</p>
                <p className="text-xs text-slate-400 leading-none mt-0.5">{user.role}</p>
              </div>
            </div>
            {canSubmit && (
              <button onClick={function(){setShowModal(true);}} className="bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold px-4 py-2 rounded-lg">+ New Request</button>
            )}
            <button onClick={function(){setUser(null);}} className="text-xs text-slate-400 hover:text-slate-600 border border-slate-200 px-3 py-1.5 rounded-lg">Switch user</button>
          </div>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-4 py-6">
        <div className="bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 mb-6 flex items-center gap-3">
          <span className="text-blue-500 text-lg">ℹ</span>
          <p className="text-sm text-blue-800">
            Signed in as <strong>{user.name}</strong> ({user.title}).{" "}
            {canSubmit ? "After submitting or approving, the app will open a pre-filled Outlook email to notify the next person." : "Requests requiring VP approval will appear below."}
          </p>
        </div>

        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
          {[
            {l:"Total",v:stats.total,c:"text-slate-800",bg:"bg-white"},
            {l:"Pending",v:stats.pending,c:"text-amber-700",bg:"bg-amber-50"},
            {l:"Approved",v:stats.approved,c:"text-emerald-700",bg:"bg-emerald-50"},
            {l:"Rejected",v:stats.rejected,c:"text-red-700",bg:"bg-red-50"},
          ].map(function(s){
            return (
              <div key={s.l} className={s.bg+" rounded-2xl border border-slate-200 p-4 text-center"}>
                <p className={"text-2xl font-bold "+s.c}>{s.v}</p>
                <p className="text-xs text-slate-500 font-medium mt-0.5">{s.l}</p>
              </div>
            );
          })}
        </div>

        <div className="flex gap-2 mb-5 overflow-x-auto pb-1">
          {statuses.map(function(s){
            return (
              <button key={s} onClick={function(){setFilter(s);}}
                className={"px-3 py-1.5 rounded-lg text-sm font-semibold whitespace-nowrap " + (filter===s?"bg-blue-700 text-white":"bg-white border border-slate-200 text-slate-600 hover:bg-slate-50")}>
                {s}{s!=="All" && <span className="ml-1.5 opacity-70">{requests.filter(function(r){return r.status===s;}).length}</span>}
              </button>
            );
          })}
        </div>

        {filtered.length === 0 ? (
          <div className="text-center py-20 text-slate-400">
            <div className="text-5xl mb-3">✈️</div>
            <p className="font-semibold text-slate-500">No requests here yet</p>
            <p className="text-sm mt-1">{canSubmit ? "Click + New Request to submit your first travel request." : "Requests pending your VP approval will appear here."}</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {filtered.map(function(req){
              return <RequestCard key={req.id} req={req} user={user} onAction={handleAction} />;
            })}
          </div>
        )}

        <div className="mt-10 bg-white border border-slate-200 rounded-2xl p-5">
          <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">VP Approval Thresholds</p>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            {[
              {icon:"🏢",label:"Domestic Travel",rule:"VP required if less than 14 days before departure"},
              {icon:"🌍",label:"International Travel",rule:"VP required if less than 21 days before departure"},
              {icon:"💰",label:"High-Cost Travel",rule:"VP required if estimated cost exceeds $2,500"},
            ].map(function(item){
              return (
                <div key={item.label} className="bg-slate-50 rounded-xl p-3 flex items-center gap-3">
                  <span className="text-2xl">{item.icon}</span>
                  <div>
                    <p className="text-sm font-bold text-slate-800">{item.label}</p>
                    <p className="text-xs text-slate-500">{item.rule}</p>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {showModal && <NewRequestModal onSubmit={handleSubmit} onClose={function(){setShowModal(false);}} user={user} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
